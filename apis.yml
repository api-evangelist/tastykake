aid: tastykake
name: Tastykake
description: >-
  Tastykake is a Philadelphia-area baked snacks brand founded in 1914, known for
  Kandy Kakes, Krimpets, Juniors, and snack pies. It has been owned by Flowers
  Foods (NYSE: FLO) since 2011 and operates as a consumer packaged goods brand
  within the Flowers Foods portfolio alongside Nature's Own, Wonder, and Dave's
  Killer Bread. No public, developer-facing APIs have been identified for the
  Tastykake brand; partner, retailer, and distribution integrations are handled
  through Flowers Foods' internal EDI and account-managed channels rather than
  a public developer portal.
